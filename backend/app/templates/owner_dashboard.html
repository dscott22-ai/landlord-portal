<!DOCTYPE html>
<html>
<head>
    <title>Owner Dashboard</title>
    <style>
        :root {
            --navy: #14213d;
            --navy-light: #1f355e;
            --slate: #5c677d;
            --bg: #f6f8fb;
            --card: #ffffff;
            --gold: #c8a96b;
            --border: #d9dee8;
            --text: #1f2937;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .topbar {
            background: var(--navy);
            color: white;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar h1 {
            margin: 0;
            font-size: 24px;
        }

        .topbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            max-width: 1150px;
            margin: 28px auto;
            padding: 0 20px 30px;
        }

        .welcome-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 8px 24px rgba(20, 33, 61, 0.06);
            margin-bottom: 22px;
        }

        .welcome-card h2 {
            margin: 0 0 8px 0;
            color: var(--navy);
        }

        .welcome-card p {
            margin: 0;
            color: var(--slate);
        }

        .section-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 8px 24px rgba(20, 33, 61, 0.06);
            margin-bottom: 22px;
        }

        .section-card h3 {
            margin-top: 0;
            color: var(--navy);
        }

        .action-btn {
            background: var(--navy);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 14px;
        }

        .action-btn:hover {
            background: var(--navy-light);
        }

        .card {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 14px;
            background: #fbfcfe;
        }

        .mini-btn {
            background: var(--gold);
            color: #14213d;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .mini-btn:hover {
            opacity: 0.92;
        }

        select {
            margin-top: 8px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: white;
        }

        img {
            max-width: 200px;
            display: block;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        a.receipt-link {
            display: inline-block;
            margin-top: 12px;
            color: var(--navy);
            font-weight: bold;
            text-decoration: none;
        }

        a.receipt-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>Landlord Portal</h1>
        <a href="/logout">Logout</a>
    </div>

    <div class="container">
        <div class="welcome-card">
            <h2>Welcome, {{ user.name }}</h2>
            <p>{{ user.email }}</p>
        </div>

        <div class="section-card">
            <h3>Payments</h3>
            <button class="action-btn" onclick="loadPayments()">Refresh Payments</button>
            <div id="payments"></div>
        </div>

        <div class="section-card">
            <h3>Maintenance Requests</h3>
            <button class="action-btn" onclick="loadRequests()">Refresh Requests</button>
            <div id="requests"></div>
        </div>
    </div>

    <script>
        async function loadPayments() {
            const response = await fetch("/owner/payments");
            const data = await response.json();

            const div = document.getElementById("payments");
            div.innerHTML = "";

            if (!data.payments || data.payments.length === 0) {
                div.innerHTML = "<p>No payments recorded yet.</p>";
                return;
            }

            data.payments.forEach(p => {
                div.innerHTML += `
                    <div class="card">
                        <b>Payment #${p.id}</b><br>
                        <b>Tenant:</b> ${p.tenant_name}<br>
                        <b>Property:</b> ${p.property_name}<br>
                        <b>Unit:</b> ${p.unit_label}<br>
                        <b>Amount:</b> $${p.amount}<br>
                        <b>Method:</b> ${p.method}<br>
                        <b>Status:</b> ${p.status}<br>
                        ${p.proof_path ? `<b>Proof:</b><br><img src="${p.proof_path}"><br>` : ""}
                        ${p.status === "Pending Verification"
                            ? `<button class="mini-btn" onclick="verifyPayment(${p.id})">Mark as Paid</button>`
                            : ""}
                        <br>
                        <a class="receipt-link" href="/receipt/${p.id}" target="_blank">View Receipt</a>
                    </div>
                `;
            });
        }

        async function verifyPayment(paymentId) {
            const response = await fetch(`/owner/payments/${paymentId}/verify`, {
                method: "PUT"
            });

            const data = await response.json();

            if (!response.ok) {
                alert(data.detail || "Verification failed.");
                return;
            }

            alert(data.message);
            loadPayments();
        }

        async function updateStatus(requestId, newStatus) {
            if (!newStatus) return;

            const response = await fetch(`/owner/maintenance/${requestId}`, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ status: newStatus })
            });

            const data = await response.json();

            if (!response.ok) {
                alert(data.detail || "Status update failed.");
                return;
            }

            loadRequests();
        }

        async function loadRequests() {
            const response = await fetch("/owner/maintenance");
            const data = await response.json();

            const div = document.getElementById("requests");
            div.innerHTML = "";

            if (!data.requests || data.requests.length === 0) {
                div.innerHTML = "<p>No maintenance requests yet.</p>";
                return;
            }

            data.requests.forEach(r => {
                div.innerHTML += `
                    <div class="card">
                        <b>Request #${r.id}</b><br>
                        <b>Tenant:</b> ${r.tenant_name}<br>
                        <b>Property:</b> ${r.property_name}<br>
                        <b>Unit:</b> ${r.unit_label}<br>
                        <b>Category:</b> ${r.category}<br>
                        <b>Priority:</b> ${r.priority}<br>
                        <b>Location:</b> ${r.location}<br>
                        <b>Description:</b> ${r.description}<br>
                        <b>Status:</b> ${r.status}<br>
                        <b>Photos:</b><br>
                        ${r.photos.map(photo => `<img src="${photo}" alt="Maintenance Photo">`).join("")}
                        <br>
                        <label><b>Update Status</b></label><br>
                        <select onchange="updateStatus(${r.id}, this.value)">
                            <option value="">Select</option>
                            <option value="Submitted">Submitted</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                `;
            });
        }

        loadPayments();
        loadRequests();
    </script>
</body>
</html>
