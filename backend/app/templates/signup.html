<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <style>
        :root {
            --navy: #14213d;
            --navy-light: #1f355e;
            --slate: #5c677d;
            --bg: #f7f8fa;
            --card: #ffffff;
            --gold: #c8a96b;
            --border: #d9dee8;
            --text: #1f2937;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f7f8fa 0%, #eef2f7 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .box {
            width: 100%;
            max-width: 520px;
            background: var(--card);
            padding: 32px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(20, 33, 61, 0.10);
            border: 1px solid var(--border);
        }

        .brand {
            margin-bottom: 24px;
        }

        .eyebrow {
            color: var(--gold);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 30px;
            color: var(--navy);
        }

        .sub {
            margin: 0 0 22px 0;
            color: var(--slate);
            font-size: 14px;
            line-height: 1.5;
        }

        label {
            display: block;
            margin-top: 14px;
            font-weight: bold;
            color: var(--navy);
            font-size: 14px;
        }

        input, select, button {
            width: 100%;
            padding: 12px 14px;
            margin-top: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 15px;
        }

        input, select {
            background: #fbfcfe;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--navy-light);
            box-shadow: 0 0 0 3px rgba(31, 53, 94, 0.10);
        }

        button {
            margin-top: 22px;
            background: var(--navy);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: var(--navy-light);
        }

        .footer-link {
            margin-top: 18px;
            font-size: 14px;
            color: var(--slate);
        }

        .footer-link a {
            color: var(--navy);
            text-decoration: none;
            font-weight: bold;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="brand">
            <div class="eyebrow">Create Account</div>
            <h1>Get Started</h1>
            <p class="sub">Create a tenant or owner account to begin using the platform.</p>
        </div>

        <form method="post" action="/signup">
            <label>Full Name</label>
            <input type="text" name="name" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <label>Role</label>
            <select name="role" required>
                <option value="tenant">Tenant</option>
                <option value="owner">Owner</option>
            </select>

            <button type="submit">Create Account</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="/login">Back to login</a>
        </div>
    </div>
</body>
</html>
